<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" id="theme-color-meta" content="#18181b">
    <link rel="icon" href="icon_192x192.png">
    <title>ThisPlay</title>
    <style>
        :root {
            /* TEMA CHIARO */
            --primary: #000000;
            --primary-hover: #333333;
            --primary-text: #ffffff; 
            --danger: #860404;
            --success: #15803d;
            --bg: #f4f4f5;
            --card-bg: #ffffff;
            --text: #171717;
            --text-muted: #52525b;
            --border: #e4e4e7;
            --input-bg: #ffffff;
            --radius: 6px;
            --logo-filter: invert(0);
        }

        [data-theme="dark"] {
            /* TEMA SCURO */
            --primary: #ffffff;
            --primary-hover: #d4d4d8;
            --primary-text: #000000;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #09090b; 
            --card-bg: #18181b; 
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --border: #3f3f46;
            --input-bg: #27272a;
            --logo-filter: invert(1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; width: 100%; position: relative; }
        
        /* NAVIGAZIONE SUPERIORE (Ridotta all'osso) */
        .top-nav { background: var(--card-bg); padding: 0.75rem 1rem; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .nav-container { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-utils { display: flex; align-items: center; }
        .nav-utils button { padding: 0.4rem; border-radius: 50%; background: transparent; display: flex; align-items: center; justify-content: center; color: var(--text); border: none; cursor: pointer; transition: background-color 0.2s; }
        .nav-utils button:hover { background: var(--input-bg); }

        /* NAVIGAZIONE INFERIORE (Il nuovo standard ergonomico) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-top: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-around; padding: 0.6rem 0 calc(0.6rem + env(safe-area-inset-bottom)); box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.1); }
        .bottom-nav button { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; color: var(--text-muted); cursor: pointer; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; width: 25%; transition: color 0.2s; }
        .bottom-nav button svg { width: 24px; height: 24px; stroke-width: 2; transition: transform 0.2s, stroke-width 0.2s; }
        .bottom-nav button.active { color: var(--text); }
        .bottom-nav button.active svg { transform: translateY(-3px); stroke-width: 2.5; }

        /* LAYOUT GLOBALE */
        /* Nota il padding-bottom: 5rem per non far mangiare i contenuti dalla bottom-nav */
        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem 5rem 1rem; min-height: 80vh; }
        .view { display: none; animation: fadeIn 0.2s ease-in-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        h1, h2, h3 { color: var(--text); font-weight: 800; margin-bottom: 1rem; }
        .card { background: var(--card-bg); padding: 2rem; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 1.5rem; }
        
        /* UI COMPONENTS */
        .btn { background: var(--primary); color: var(--primary-text); border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--text); color: var(--text); }
        .btn-outline:hover { background: var(--input-bg); }
        .btn-small { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        
        input { padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid var(--border); border-radius: 4px; width: 100%; background-color: var(--input-bg); color: var(--text); outline: none; }
        input:focus { border-color: var(--primary); }

       /* GRID LIBRERIA COMPATTA */
        .library-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); 
            gap: 0.6rem; 
        }
        .series-card { 
            background: var(--card-bg); 
            border: 1.5px solid var(--border); 
            border-radius: var(--radius); 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.15s, border-color 0.15s; 
        }
        .series-card:hover { 
            transform: translateY(-2px); 
            border-color: var(--primary); 
        }
        .series-card img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            display: block; 
            border-bottom: 1px solid var(--border); 
        }
        .series-card-content { 
            padding: 0.4rem 0.5rem; 
        }
        .series-title { 
            font-weight: 800; 
            font-size: 0.75rem; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: block; 
            line-height: 1.2;
        }
        .series-status { 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            display: block; 
            margin-top: 0.15rem; 
            text-transform: uppercase; 
            font-weight: 700;
        }

        /* LISTA EPISODI */
        .season-block { background: var(--input-bg); padding: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; }
        .season-title { color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .episode-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .episode-row:last-child { border-bottom: none; padding-bottom: 0; }
        .ep-title { color: var(--text); font-size: 0.95rem; font-weight: 600; }
        .ep-title.watched { color: var(--text-muted); text-decoration: line-through; }
        .ep-num { color: var(--text-muted); width: 25px; display: inline-block; }

        /* MODALE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--card-bg); padding: 2rem; border-radius: var(--radius); width: 90%; max-width: 400px; border: 1px solid var(--border); }
        
        /* FOOTER */
        footer { text-align: center; padding: 2rem 1rem calc(6rem + env(safe-area-inset-bottom)) 1rem; border-top: 1px solid var(--border); margin-top: 3rem; color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <!-- NAVBAR SUPERIORE (Testata) -->
    <nav class="top-nav">
        <div class="nav-container">
            <div style="font-size: 1.25rem; letter-spacing: -1.5px; color: var(--text); display: flex; align-items: center; text-transform: uppercase;">
                <strong style="font-weight: 900;">This</strong><span style="font-weight: 400; opacity: 0.7;">Play</span>
            </div>
            
            <div class="nav-utils">
                <button onclick="openSettings()" title="Impostazioni">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <!-- VISTA: HOME -->
        <section id="view-home" class="view active card" style="padding-top: 1rem;">
            <div id="home-content"></div>
        </section>

        <!-- VISTA: LIBRERIA -->
        <section id="view-library" class="view">
            
            <!-- HEADER A TAB DINAMICO -->
            <div style="display: flex; gap: 1rem; align-items: baseline; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; user-select: none;">
                <h2 id="tab-tv" onclick="switchLibraryTab('tv')" style="margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; cursor: pointer; color: var(--text); opacity: 1; transition: color 0.2s, opacity 0.2s;">Le Mie Serie</h2>
                <span style="font-size: 1.5rem; color: var(--text-muted); font-weight: 900; opacity: 0.5;">/</span>
                <h2 id="tab-movie" onclick="switchLibraryTab('movie')" style="margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; cursor: pointer; color: var(--text-muted); opacity: 0.5; transition: color 0.2s, opacity 0.2s;">I Miei Film</h2>
            </div>
            
            <!-- SEZIONE 1: SERIE TV -->
            <div id="library-tv-section">
                <div id="tv-filters" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem;">
                    <button class="btn btn-small btn-outline active" onclick="setLibraryFilter('tv', 'all')">Tutte</button>
                    <button class="btn btn-small btn-outline" onclick="setLibraryFilter('tv', 'watching')">In Corso</button>
                    <button class="btn btn-small btn-outline" onclick="setLibraryFilter('tv', 'planned')">Da Vedere</button>
                    <button class="btn btn-small btn-outline" onclick="setLibraryFilter('tv', 'paused')">In Pausa</button>
                    <button class="btn btn-small btn-outline" onclick="setLibraryFilter('tv', 'completed')">Viste</button>
                    <button class="btn btn-small btn-outline" style="border-color: var(--danger); color: var(--danger);" onclick="setLibraryFilter('tv', 'favorite')">❤ Preferite</button>
                </div>
                <div id="tv-grid"></div>
            </div>

            <!-- SEZIONE 2: FILM (Nascosta di default) -->
            <div id="library-movie-section" style="display: none;">
                <div id="movie-filters" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem;">
                    <button class="btn btn-small btn-outline active" onclick="setLibraryFilter('movie', 'all')">Tutti</button>
                    <button class="btn btn-small btn-outline" onclick="setLibraryFilter('movie', 'planned')">Da Vedere</button>
                    <button class="btn btn-small btn-outline" onclick="setLibraryFilter('movie', 'completed')">Visti</button>
                    <button class="btn btn-small btn-outline" style="border-color: var(--danger); color: var(--danger);" onclick="setLibraryFilter('movie', 'favorite')">❤ Preferiti</button>
                </div>
                <div id="movie-grid"></div>
            </div>

        </section>

        <!-- VISTA: RICERCA -->
        <section id="view-search" class="view card">
            <h2>Cerca Titolo</h2>
            
            <!-- SELEZIONE TIPO MEDIA -->
            <div style="display: flex; gap: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem;">
                <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.85rem;">
                    <input type="radio" name="search-type" value="tv" checked style="width: 16px; height: 16px; accent-color: var(--text);"> Serie TV
                </label>
                <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; color: var(--text-muted);">
                    <input type="radio" name="search-type" value="movie" style="width: 16px; height: 16px; accent-color: var(--text);"> Film
                </label>
                <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; color: var(--text-muted);">
                    <input type="radio" name="search-type" value="person" style="width: 16px; height: 16px; accent-color: var(--text);"> Attore
                </label>
            </div>

            <!-- MOTORE DI RICERCA -->
            <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                <input type="text" id="search-input" placeholder="Es: Scissione, Interstellar..." oninput="handleSearchInput(this.value)">
                <button class="btn" onclick="searchMedia()">Cerca</button>
            </div>
            
            <!-- CONTENITORE RISULTATI RICERCA MANUALE (Inizialmente vuoto) -->
            <div id="search-results" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>

            <!-- SEZIONE SCOPERTA: TENDENZE GLOBALI (Visibile di default) -->
            <div id="discovery-section" style="margin-top: 2rem;">
                <div id="discovery-content"></div>
            </div>
        </section>

        
        <!-- VISTA: STATISTICHE -->
        <section id="view-stats" class="view card">
            <h2>Le Tue Statistiche</h2>
            <div id="stats-content"></div>
        </section>

        <!-- VISTA: DETTAGLIO SERIE -->
        <section id="view-detail" class="view card">
            <button class="btn btn-outline btn-small" onclick="navigateBack()" style="margin-bottom: 1.5rem;">← Torna Indietro</button>
            <div id="detail-content"></div>
        </section>

        <!-- VISTA: SCHEDA ATTORE -->
        <section id="view-actor" class="view card">
            <div id="actor-content"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        ThisPlay<br>
        Copyright &copy; 2026 Alessandro Darie
    </footer>

    <!-- MODALE IMPOSTAZIONI -->
    <div id="modal-settings" class="modal-overlay" onclick="closeSettings(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-top: 0; margin-bottom: 1.5rem; text-transform: uppercase; border-bottom: 2px solid var(--text); padding-bottom: 0.5rem; font-weight: 900;">Impostazioni App</h3>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                <strong style="font-size: 1.1rem;">Tema Scuro</strong>
                <button class="btn btn-outline btn-small" id="btn-toggle-theme" onclick="toggleTheme()" style="min-width: 70px; font-weight: 900;">ON</button>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <strong style="font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 0.75rem;">Database & Archiviazione</strong>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    
                    <button class="btn btn-outline" style="justify-content: flex-start; padding: 0.75rem; font-weight: 700;" onclick="closeSettings(null, true); exportData();">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Esporta Dati
                    </button>
                    <button class="btn btn-outline" style="justify-content: flex-start; padding: 0.75rem; font-weight: 700;" onclick="closeSettings(null, true); document.getElementById('import-file').click();">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Importa Dati
                    </button>
                    <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
                    
                    <div style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                        <button class="btn btn-outline" style="justify-content: flex-start; padding: 0.75rem; font-weight: 700; border-color: var(--danger); color: var(--danger);" onclick="closeSettings(null, true); document.getElementById('tvtime-zip-input').click();">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            Migra da TV Time (.zip)
                        </button>
                        <input type="file" id="tvtime-zip-input" accept=".zip" style="display: none;" onchange="handleTVTimeZip(event)">
                    </div>

                </div>
            </div>

            <div class="modal-actions">
                <button class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem; font-weight: 800;" onclick="closeSettings(null, true)">Chiudi</button>
            </div>
        </div>
    </div>

    <!-- MODALE CONFERMA (Dinamica) -->
    <div id="modal-confirm" class="modal-overlay">
        <div class="modal-card" style="text-align: center; border-width: 2px; border-style: solid;">
            <h3 style="margin-top: 0; margin-bottom: 1rem; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px;"></h3>
            <p id="modal-confirm-message" style="margin-bottom: 1.5rem; font-weight: 600; font-size: 0.95rem;"></p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="btn-confirm-cancel" class="btn btn-outline" style="flex: 1; font-weight: 800;">Annulla</button>
                <button id="btn-confirm-ok" class="btn" style="flex: 1; font-weight: 800;"></button>
            </div>
        </div>
    </div>

    <!-- MODALE DETTAGLIO EPISODIO -->
    <div id="modal-episode" class="modal-overlay" onclick="closeEpisodeModal(event)">
        <div class="modal-card" style="padding: 0; overflow: hidden; max-width: 500px; width: 95%;" onclick="event.stopPropagation()">
            <div id="modal-episode-content"></div>
            <div style="padding: 1rem; border-top: 1px solid var(--border); background: var(--input-bg);">
                <button class="btn btn-outline" style="width: 100%; font-weight: 800;" onclick="closeEpisodeModal(null, true)">Chiudi</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="api-config.js"></script>
    <script src="migrator.js"></script>
    <script src="app.js"></script>

    <!-- LOADER GLOBALE -->
    <div id="global-loader" class="modal-overlay" style="z-index: 10000; flex-direction: column; gap: 1rem;">
        <div style="width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <strong style="color: white; font-weight: 900; letter-spacing: 1px;">CARICAMENTO...</strong>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <!-- NAVBAR INFERIORE (Navigazione Principale) -->
    <nav class="bottom-nav">
        <button onclick="switchTab('home')" id="nav-home" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </button>
        <button onclick="switchTab('library')" id="nav-library">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            <span>Libreria</span>
        </button>
        <button onclick="switchTab('search')" id="nav-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span>Ricerca</span>
        </button>
        <button onclick="switchTab('stats')" id="nav-stats">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            <span>Stats</span>
        </button>
    </nav>
</body>
</html>
